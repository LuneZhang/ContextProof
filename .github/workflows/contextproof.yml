name: contextproof

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Audit agent context
        run: |
          python -m contextproof.cli audit . \
            --pr-comment
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contextproof-report
          path: |
            .contextproof/report.json
            .contextproof/report.md
            .contextproof/pr-comment.md
