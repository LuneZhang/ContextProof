name: context-proof
version: 0.1.0
triggers:
  default_prompt: "Use $context-proof to audit and minimize this repository's AGENTS.md, CLAUDE.md, SKILL.md, and related agent context."
commands:
  audit: "python scripts/contextproof.py audit . --pr-comment --minimize"
  quickstart: "python scripts/contextproof.py quickstart ."
